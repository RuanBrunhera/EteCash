version: '3.8'

services:
  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_DB: etecash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1q2w3e4r5T
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: luis_fernando_tcc@admin.com
      PGADMIN_DEFAULT_PASSWORD: 1q2w3e4r5T6y7u8i9o0p
    ports:
      - "5050:80"
    depends_on:
      - db

  app:
    build: .
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 1q2w3e4r5T
      DB_NAME: etecash

volumes:
  pgdata: