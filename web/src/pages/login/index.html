<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">

        <!-- Login form -->
        <div class="form-box login">
            <form action="#">
                <h1>Login aluno</h1>
                <div class="input-box">
                    <input type="text" placeholder="RM" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Não se lembra da senha?</a>
                </div>
                <button type="submit" class="btn">Entrar</button>
                <p>Or login with social platforms</p>
                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </form>
        </div>

        <!-- Register form -->
        <div class="form-box register">
            <form action="#">
                <h1>Login cantina</h1>
                <div class="input-box">
                    <input type="text" placeholder="CPF" maxlength="14" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="EmailLojista@gmail.com" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="btn">Entrar</button>
                <p>Or register with social platforms</p>
                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </form>
        </div>

        <!-- Toggle Box -->
        <div class="toggle-box"></div>

        <!-- Toggle Left -->
        <div class="toggle-panel toggle-left">
            <h1>Bem vindo etequiano!</h1>
            <p>É dono de uma cantina?</p>
            <button class="btn register-btn">Entrar como lojista</button>
        </div>

        <!-- Toggle Right -->
        <div class="toggle-panel toggle-right">
            <h1>Bem vindo lojista!</h1>
            <p>É um(a) etequiano?</p>
            <button class="btn login-btn">Entrar como aluno</button>
        </div>

    </div>
</body>
<script src="script.js"></script>
</html>
